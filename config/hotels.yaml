    city: "Москва"
    stars: 5
    sources:
      yandex_travel:
        url_template: "https://travel.yandex.ru/hotels/moscow/hotel-metropol--123/?checkinDate={checkin}&checkoutDate={checkout}&adults={adults}"
      ostrovok:
        url_template: "https://ostrovok.ru/hotel/russia/moscow/mid7595994/metropol_hotel/?dates={checkin_dot}-{checkout_dot}&guests={adults}&search=yes"
