hotels:
  - slug: "metropol-moscow"
    name: "Метрополь Москва"
    city: "Москва"
    stars: 5
    website: "https://metropol-moscow.ru"
    sources:
      ostrovok:
        url_template: "https://ostrovok.ru/hotel/russia/moscow/mid7595994/metropol_hotel/?dates={checkin_dot}-{checkout_dot}&guests={adults}&search=yes"
      hotel_site:
        url_template: "https://ru-ibe.tlintegration.ru/booking2/hotel/index.gc.html?providerId=6315&arrivalDate={checkin}&departureDate={checkout}&adults={adults}&language=ru"
        has_dates: true
        widget: travelline


schedule:
  checkin_offsets_days: [1, 3, 7, 14, 30]
  nights: [1, 2, 3]
  adults: 2
