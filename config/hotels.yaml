        url_template: "https://www.tbank.ru/travel/hotels/russia/moscow/metropol/?checkIn={checkin}&checkOut={checkout}&adults={adults}"
      onetwotrip:
        url_template: "https://www.onetwotrip.com/ru/hotels/hotel/?checkIn={checkin}&checkOut={checkout}&adults={adults}"
      avito:
        url_template: "https://www.avito.ru/moskva/doma_otdykha/metropol-123456"
        has_dates: false


schedule:
  checkin_offsets_days: [1, 3, 7, 14, 30]
