<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotelDash — мониторинг цен на отели</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        metabase-dashboard { display: block; width: 100%; height: 100vh; }
    </style>
</head>
<body>

<script defer src="https://hoteldash.ru/metabase/app/embed.js"></script>
<script>
    function defineMetabaseConfig(config) {
        window.metabaseConfig = config;
    }
</script>

<script>
    defineMetabaseConfig({
        "theme": {
            "preset": "light"
        },
        "isGuest": true,
        "instanceUrl": "https://hoteldash.ru/metabase"
    });
</script>

<metabase-dashboard dashboard-id="2" with-title="true" with-downloads="true"></metabase-dashboard>

</body>
</html>
