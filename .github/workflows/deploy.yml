name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 130.193.40.81
          username: zavarov888
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/hoteldash.ru

            # Забираем свежий код
            git pull origin master

            # Активируем venv, создаём если нет
            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi
            source .venv/bin/activate

            # Зависимости
            pip install -r requirements.txt --quiet

            # Playwright-браузер (только если ещё нет)
            playwright install chromium --with-deps 2>/dev/null || true

            # Миграция БД (создаёт таблицы если не существуют)
            python scripts/init_db.py

            echo "Deploy complete: $(date)"
