name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd ~/hoteldash.ru

            git pull origin master

            # hotels.yaml не в git — если нет, копируем из example
            if [ ! -f config/hotels.yaml ]; then
              cp config/hotels.yaml.example config/hotels.yaml
              echo "WARNING: config/hotels.yaml created from example — edit it!"
            fi

            # Пересобираем образ приложения
            docker compose build --quiet app

            # БД + Metabase + nginx — всегда подняты
            docker compose up -d db metabase nginx

            # Миграция
            docker compose run --rm app python scripts/init_db.py

            echo "Deploy complete: $(date)"
